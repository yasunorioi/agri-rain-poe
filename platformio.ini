; agri-rain-poe — M5Stack ATOM PoE rain gauge node (SEN0575 UART/Modbus RTU)
;
; Hardware:
;   - M5Stack ATOM PoE Kit (ATOM Lite + PoE Base with W5500 Ethernet)
;   - DFRobot SEN0575 Gravity Rainfall Sensor, DIP switch set to UART mode
;   - SEN0575 on Grove (G26/G32):
;       M5 G26 (TX) ---> SEN0575 SDA/RX
;       M5 G32 (RX) <--- SEN0575 SCL/TX
;       VCC=5V, GND=GND
;
; Build / upload from VSCode + PlatformIO:
;   - First flash via USB-C
;   - Subsequent flashes via ArduinoOTA over Ethernet (auto-discovered as agri-rain-XX)

[env:m5atom-poe]
; pioarduino fork pins to arduino-esp32 3.x, which is the first release
; with ETH.begin(ETH_PHY_W5500, ...) — i.e. an ESP-IDF-lwIP-backed driver
; for the W5500. That lets ESPmDNS / ArduinoOTA actually work (the
; arduino-libraries/Ethernet path uses the W5500's own offloaded stack
; and bypasses lwIP entirely, which is why mDNS was dead). Side effect:
; sockets are now NetworkServer / NetworkClient / NetworkUDP (the
; transport-agnostic types in arduino-esp32 3.x).
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 115200

build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
	https://github.com/yasunorioi/agri-node-poe-core.git
